openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Glory Sports API - Cricket sports ecosystem for India
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: players
    description: Player profiles and discovery
  - name: turfs
    description: Turf registration and management
  - name: bookings
    description: Slot booking management
  - name: teams
    description: Team management
  - name: matches
    description: Match management and scoring
  - name: stats
    description: Player statistics
  - name: notifications
    description: Notification management
  - name: payments
    description: Razorpay payment processing
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with phone/email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/send-otp:
    post:
      operationId: sendOtp
      tags: [auth]
      summary: Send OTP to phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpSendInput"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpSendResponse"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP and authenticate or register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerifyInput"
      responses:
        "200":
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpVerifyResponse"

  /auth/google:
    post:
      operationId: googleAuth
      tags: [auth]
      summary: Sign in or register with Google OAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleAuthInput"
      responses:
        "200":
          description: Authenticated via Google
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleSignInResponse"

  # PLAYERS
  /players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List and discover players
      parameters:
        - name: city
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
        - name: minRating
          in: query
          schema:
            type: number
        - name: available
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerListResponse"

  /players/{playerId}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get player profile
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerProfile"

  /players/{playerId}/stats:
    get:
      operationId: getPlayerStats
      tags: [players]
      summary: Get player report card and stats
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerStats"

  /players/me/profile:
    put:
      operationId: updateMyProfile
      tags: [players]
      summary: Update own player profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerProfile"

  /players/me/availability:
    put:
      operationId: updateAvailability
      tags: [players]
      summary: Update player availability status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilityInput"
      responses:
        "200":
          description: Updated availability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerProfile"

  # NEED PLAYERS POSTS
  /need-players:
    get:
      operationId: listNeedPlayers
      tags: [players]
      summary: List "need players" posts
      parameters:
        - name: city
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Need players posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NeedPlayersPost"
    post:
      operationId: createNeedPlayersPost
      tags: [players]
      summary: Post a need players request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NeedPlayersInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NeedPlayersPost"

  /need-players/{postId}/join:
    post:
      operationId: joinNeedPlayersPost
      tags: [players]
      summary: Join a need players post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NeedPlayersPost"

  # TEAMS
  /teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List teams
      parameters:
        - name: city
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Teams list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"
    post:
      operationId: createTeam
      tags: [teams]
      summary: Create a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamInput"
      responses:
        "201":
          description: Created team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /teams/{teamId}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get team details
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /teams/{teamId}/join:
    post:
      operationId: joinTeam
      tags: [teams]
      summary: Request to join a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Join request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /teams/{teamId}/members/{memberId}:
    patch:
      operationId: updateTeamMember
      tags: [teams]
      summary: Accept or reject a team join request
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  # TURFS
  /turfs:
    get:
      operationId: listTurfs
      tags: [turfs]
      summary: List turfs
      parameters:
        - name: city
          in: query
          schema:
            type: string
        - name: sport
          in: query
          schema:
            type: string
        - name: verified
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Turfs list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Turf"
    post:
      operationId: createTurf
      tags: [turfs]
      summary: Register a turf
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TurfInput"
      responses:
        "201":
          description: Created turf
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Turf"

  /turfs/{turfId}:
    get:
      operationId: getTurf
      tags: [turfs]
      summary: Get turf details
      parameters:
        - name: turfId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Turf details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Turf"

  /turfs/{turfId}/slots/{date}:
    get:
      operationId: fetchTurfSlotAvailability
      tags: [turfs]
      summary: Get available slots for a turf on a date
      parameters:
        - name: turfId
          in: path
          required: true
          schema:
            type: integer
        - name: date
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Available slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TurfSlot"

  /turfs/my:
    get:
      operationId: getMyTurfs
      tags: [turfs]
      summary: Get turfs owned by current user
      responses:
        "200":
          description: My turfs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Turf"

  /turfs/{turfId}/dashboard:
    get:
      operationId: getTurfDashboard
      tags: [turfs]
      summary: Get turf owner dashboard stats
      parameters:
        - name: turfId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Turf dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TurfDashboard"

  # BOOKINGS
  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List user's bookings
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: turfId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Bookings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Book a turf slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{bookingId}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get booking details
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
    delete:
      operationId: cancelBooking
      tags: [bookings]
      summary: Cancel a booking
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  # PAYMENTS
  /payments/razorpay-order:
    post:
      operationId: createRazorpayOrder
      tags: [payments]
      summary: Create a Razorpay order for turf booking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RazorpayOrderInput"
      responses:
        "201":
          description: Razorpay order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RazorpayOrderResponse"

  /payments/razorpay-verify:
    post:
      operationId: verifyRazorpayPayment
      tags: [payments]
      summary: Verify Razorpay payment and confirm booking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RazorpayVerifyInput"
      responses:
        "201":
          description: Payment verified, booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  # MATCHES
  /matches:
    get:
      operationId: listMatches
      tags: [matches]
      summary: List matches
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: teamId
          in: query
          schema:
            type: integer
        - name: playerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Matches list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"
    post:
      operationId: createMatch
      tags: [matches]
      summary: Create a new match
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchInput"
      responses:
        "201":
          description: Match created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /matches/{matchId}:
    get:
      operationId: getMatch
      tags: [matches]
      summary: Get match details
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Match details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /matches/{matchId}/score:
    patch:
      operationId: updateMatchScore
      tags: [matches]
      summary: Update match score
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchScoreInput"
      responses:
        "200":
          description: Score updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /matches/{matchId}/verify:
    post:
      operationId: verifyMatch
      tags: [matches]
      summary: Captain verifies match result
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchVerifyInput"
      responses:
        "200":
          description: Match verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /matches/{matchId}/confirm-participation:
    post:
      operationId: confirmMatchParticipation
      tags: [matches]
      summary: Player confirms they played in a match
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Participation confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  # STATS
  /stats/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [stats]
      summary: Get top player leaderboard
      parameters:
        - name: city
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  # NOTIFICATIONS
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List user notifications
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{notificationId}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  # ADMIN
  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      summary: Get admin dashboard summary
      responses:
        "200":
          description: Admin dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin - list all users
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"

  /admin/users/{userId}/ban:
    patch:
      operationId: adminBanUser
      tags: [admin]
      summary: Admin - ban or unban a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BanUserInput"
      responses:
        "200":
          description: User ban status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/turfs:
    get:
      operationId: adminListTurfs
      tags: [admin]
      summary: Admin - list all turfs pending verification
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Turfs list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Turf"

  /admin/turfs/{turfId}/verify:
    patch:
      operationId: adminVerifyTurf
      tags: [admin]
      summary: Admin - verify or reject a turf
      parameters:
        - name: turfId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyTurfInput"
      responses:
        "200":
          description: Turf verification updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Turf"

  /admin/matches:
    get:
      operationId: adminListMatches
      tags: [admin]
      summary: Admin - list matches with optional suspicious filter
      parameters:
        - name: suspicious
          in: query
          schema:
            type: boolean
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"

  /admin/matches/{matchId}/flag:
    patch:
      operationId: adminFlagMatch
      tags: [admin]
      summary: Admin - flag or clear a suspicious match
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlagMatchInput"
      responses:
        "200":
          description: Match flagged status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /admin/bookings:
    get:
      operationId: adminListBookings
      tags: [admin]
      summary: Admin - list all bookings
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: All bookings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBookingListResponse"

  /admin/bookings/{bookingId}/cancel:
    patch:
      operationId: adminCancelBooking
      tags: [admin]
      summary: Admin - cancel a booking
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /admin/teams:
    get:
      operationId: adminListTeams
      tags: [admin]
      summary: Admin - list all teams
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: All teams
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTeamListResponse"

  /admin/feed:
    get:
      operationId: adminListFeed
      tags: [admin]
      summary: Admin - list all need-players posts
      parameters:
        - name: city
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: All feed posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NeedPlayersPost"

  /admin/feed/{postId}:
    delete:
      operationId: adminDeleteFeedPost
      tags: [admin]
      summary: Admin - delete/deactivate a need-players post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # AUTH
    RegisterInput:
      type: object
      required: [name, phone, password, role]
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        password:
          type: string
        role:
          type: string
          enum: [player, turf_owner]
        city:
          type: ["string", "null"]

    LoginInput:
      type: object
      required: [phone, password]
      properties:
        phone:
          type: string
        password:
          type: string

    OtpSendInput:
      type: object
      required: [phone]
      properties:
        phone:
          type: string

    OtpSendResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        devOtp:
          type: ["string", "null"]

    OtpVerifyInput:
      type: object
      required: [phone, otp]
      properties:
        phone:
          type: string
        otp:
          type: string
        name:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
        city:
          type: ["string", "null"]

    OtpVerifyResponse:
      type: object
      required: [newUser]
      properties:
        newUser:
          type: boolean
        token:
          type: ["string", "null"]
        userId:
          type: ["integer", "null"]

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, phone, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        role:
          type: string
          enum: [player, turf_owner, admin]
        city:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        isBanned:
          type: boolean
        isVerified:
          type: boolean
        createdAt:
          type: string

    # PLAYERS
    PlayerProfile:
      type: object
      required: [id, userId, name]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        city:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        playerRole:
          type: ["string", "null"]
          enum: [batsman, bowler, all_rounder, wicket_keeper, null]
        battingStyle:
          type: ["string", "null"]
        bowlingStyle:
          type: ["string", "null"]
        availabilityStatus:
          type: ["string", "null"]
          enum: [available_today, available_weekend, looking_for_team, unavailable, null]
        overallRating:
          type: ["number", "null"]
        battingRating:
          type: ["number", "null"]
        bowlingRating:
          type: ["number", "null"]
        isVerified:
          type: boolean
        trustScore:
          type: ["number", "null"]
        fairPlayScore:
          type: ["number", "null"]
        verifiedMatchPct:
          type: ["number", "null"]
        teamsCount:
          type: integer
        matchesCount:
          type: integer

    PlayerProfileInput:
      type: object
      properties:
        city:
          type: string
        playerRole:
          type: string
          enum: [batsman, bowler, all_rounder, wicket_keeper]
        battingStyle:
          type: string
        bowlingStyle:
          type: string
        avatarUrl:
          type: string

    PlayerStats:
      type: object
      required: [playerId]
      properties:
        playerId:
          type: integer
        totalMatches:
          type: integer
        totalRuns:
          type: integer
        totalWickets:
          type: integer
        strikeRate:
          type: ["number", "null"]
        economy:
          type: ["number", "null"]
        highestScore:
          type: ["integer", "null"]
        winPercentage:
          type: ["number", "null"]
        mvpCount:
          type: integer
        verifiedMatchCount:
          type: integer
        recentMatches:
          type: array
          items:
            $ref: "#/components/schemas/MatchSummary"

    PlayerListResponse:
      type: object
      required: [players, total]
      properties:
        players:
          type: array
          items:
            $ref: "#/components/schemas/PlayerProfile"
        total:
          type: integer

    AvailabilityInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [available_today, available_weekend, looking_for_team, unavailable]

    NeedPlayersPost:
      type: object
      required: [id, userId, title, city, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        city:
          type: string
        sport:
          type: string
        neededCount:
          type: integer
        joinedCount:
          type: integer
        matchDate:
          type: ["string", "null"]
        createdAt:
          type: string

    NeedPlayersInput:
      type: object
      required: [title, city, neededCount]
      properties:
        title:
          type: string
        description:
          type: string
        city:
          type: string
        sport:
          type: string
        neededCount:
          type: integer
        matchDate:
          type: string

    # TEAMS
    Team:
      type: object
      required: [id, name, captainId, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        captainId:
          type: integer
        captainName:
          type: string
        city:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        sport:
          type: string
        memberCount:
          type: integer
        winCount:
          type: integer
        matchCount:
          type: integer
        members:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"
        createdAt:
          type: string

    TeamInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        city:
          type: string
        sport:
          type: string
        logoUrl:
          type: string

    TeamMember:
      type: object
      required: [id, userId, teamId, status]
      properties:
        id:
          type: integer
        userId:
          type: integer
        teamId:
          type: integer
        userName:
          type: string
        playerRole:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, active, rejected]
        joinedAt:
          type: ["string", "null"]

    TeamMemberUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, rejected]

    # TURFS
    Turf:
      type: object
      required: [id, ownerId, name, city, createdAt]
      properties:
        id:
          type: integer
        ownerId:
          type: integer
        ownerName:
          type: string
        name:
          type: string
        city:
          type: string
        address:
          type: ["string", "null"]
        sports:
          type: array
          items:
            type: string
        pricePerHour:
          type: number
        openTime:
          type: string
        closeTime:
          type: string
        photos:
          type: array
          items:
            type: string
        verificationStatus:
          type: string
          enum: [pending, verified, rejected]
        isActive:
          type: boolean
        createdAt:
          type: string

    TurfInput:
      type: object
      required: [name, city, pricePerHour]
      properties:
        name:
          type: string
        city:
          type: string
        address:
          type: string
        sports:
          type: array
          items:
            type: string
        pricePerHour:
          type: number
        openTime:
          type: string
        closeTime:
          type: string
        photos:
          type: array
          items:
            type: string

    TurfSlot:
      type: object
      required: [startTime, endTime, isAvailable]
      properties:
        startTime:
          type: string
        endTime:
          type: string
        isAvailable:
          type: boolean
        price:
          type: number

    TurfDashboard:
      type: object
      required: [turfId]
      properties:
        turfId:
          type: integer
        todayBookings:
          type: integer
        monthlyEarnings:
          type: number
        totalBookings:
          type: integer
        popularSlots:
          type: array
          items:
            type: string
        upcomingBookings:
          type: array
          items:
            $ref: "#/components/schemas/Booking"

    # BOOKINGS
    Booking:
      type: object
      required: [id, turfId, userId, date, startTime, endTime, status, createdAt]
      properties:
        id:
          type: integer
        turfId:
          type: integer
        turfName:
          type: string
        userId:
          type: integer
        userName:
          type: string
        date:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        totalAmount:
          type: number
        status:
          type: string
          enum: [confirmed, cancelled, completed]
        matchId:
          type: ["integer", "null"]
        razorpayOrderId:
          type: ["string", "null"]
        razorpayPaymentId:
          type: ["string", "null"]
        paymentStatus:
          type: string
          enum: [pending, paid, failed]
        createdAt:
          type: string

    BookingInput:
      type: object
      required: [turfId, date, startTime, endTime]
      properties:
        turfId:
          type: integer
        date:
          type: string
        startTime:
          type: string
        endTime:
          type: string

    RazorpayOrderInput:
      type: object
      required: [turfId, date, startTime, endTime]
      properties:
        turfId:
          type: integer
        date:
          type: string
        startTime:
          type: string
        endTime:
          type: string

    RazorpayOrderResponse:
      type: object
      required: [orderId, amount, currency, keyId]
      properties:
        orderId:
          type: string
        amount:
          type: integer
        currency:
          type: string
        keyId:
          type: string
        turfName:
          type: string
        description:
          type: string

    RazorpayVerifyInput:
      type: object
      required: [razorpayOrderId, razorpayPaymentId, razorpaySignature, turfId, date, startTime, endTime]
      properties:
        razorpayOrderId:
          type: string
        razorpayPaymentId:
          type: string
        razorpaySignature:
          type: string
        turfId:
          type: integer
        date:
          type: string
        startTime:
          type: string
        endTime:
          type: string

    # MATCHES
    Match:
      type: object
      required: [id, turfId, teamAId, teamBId, status, createdAt]
      properties:
        id:
          type: integer
        turfId:
          type: integer
        turfName:
          type: string
        teamAId:
          type: integer
        teamAName:
          type: string
        teamBId:
          type: integer
        teamBName:
          type: string
        overs:
          type: integer
        matchType:
          type: string
        matchDate:
          type: string
        status:
          type: string
          enum: [scheduled, in_progress, completed, verified, disputed, flagged]
        teamAScore:
          type: ["integer", "null"]
        teamAWickets:
          type: ["integer", "null"]
        teamBScore:
          type: ["integer", "null"]
        teamBWickets:
          type: ["integer", "null"]
        winnerTeamId:
          type: ["integer", "null"]
        mvpPlayerId:
          type: ["integer", "null"]
        mvpPlayerName:
          type: ["string", "null"]
        teamACaptainVerified:
          type: boolean
        teamBCaptainVerified:
          type: boolean
        isSuspicious:
          type: boolean
        bookingId:
          type: ["integer", "null"]
        createdAt:
          type: string

    MatchInput:
      type: object
      required: [turfId, teamAId, teamBId, overs, matchDate]
      properties:
        turfId:
          type: integer
        teamAId:
          type: integer
        teamBId:
          type: integer
        overs:
          type: integer
        matchType:
          type: string
        matchDate:
          type: string
        bookingId:
          type: integer

    MatchScoreInput:
      type: object
      properties:
        teamAScore:
          type: integer
        teamAWickets:
          type: integer
        teamBScore:
          type: integer
        teamBWickets:
          type: integer
        winnerTeamId:
          type: integer
        mvpPlayerId:
          type: integer
        status:
          type: string

    MatchVerifyInput:
      type: object
      required: [verified]
      properties:
        verified:
          type: boolean
        captainSide:
          type: string
          enum: [A, B]

    MatchSummary:
      type: object
      required: [matchId, matchDate, result]
      properties:
        matchId:
          type: integer
        matchDate:
          type: string
        result:
          type: string
        teamA:
          type: string
        teamB:
          type: string
        myTeamScore:
          type: ["integer", "null"]
        opponentScore:
          type: ["integer", "null"]
        isMvp:
          type: boolean

    # STATS / LEADERBOARD
    LeaderboardEntry:
      type: object
      required: [rank, playerId, name]
      properties:
        rank:
          type: integer
        playerId:
          type: integer
        name:
          type: string
        city:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        overallRating:
          type: ["number", "null"]
        totalRuns:
          type: integer
        totalWickets:
          type: integer
        matchesPlayed:
          type: integer
        winPct:
          type: ["number", "null"]

    # NOTIFICATIONS
    Notification:
      type: object
      required: [id, userId, type, title, isRead, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
        title:
          type: string
        body:
          type: ["string", "null"]
        isRead:
          type: boolean
        referenceId:
          type: ["integer", "null"]
        referenceType:
          type: ["string", "null"]
        createdAt:
          type: string

    # ADMIN
    AdminDashboard:
      type: object
      required: [totalUsers, totalMatches, totalBookings, totalTurfs]
      properties:
        totalUsers:
          type: integer
        totalPlayers:
          type: integer
        totalTurfOwners:
          type: integer
        totalMatches:
          type: integer
        verifiedMatches:
          type: integer
        suspiciousMatches:
          type: integer
        totalBookings:
          type: integer
        totalTurfs:
          type: integer
        pendingTurfs:
          type: integer
        revenueEstimate:
          type: number
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"

    ActivityItem:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        createdAt:
          type: string

    AdminUserListResponse:
      type: object
      required: [users, total]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer

    BanUserInput:
      type: object
      required: [isBanned]
      properties:
        isBanned:
          type: boolean
        reason:
          type: string

    VerifyTurfInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [verified, rejected]
        notes:
          type: string

    FlagMatchInput:
      type: object
      required: [isSuspicious]
      properties:
        isSuspicious:
          type: boolean
        reason:
          type: string

    AdminBookingListResponse:
      type: object
      required: [bookings, total]
      properties:
        bookings:
          type: array
          items:
            $ref: "#/components/schemas/Booking"
        total:
          type: integer
        totalRevenue:
          type: number

    AdminTeamListResponse:
      type: object
      required: [teams, total]
      properties:
        teams:
          type: array
          items:
            $ref: "#/components/schemas/Team"
        total:
          type: integer

    GoogleAuthInput:
      type: object
      required: [accessToken]
      properties:
        accessToken:
          type: string

    GoogleSignInResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
        newUser:
          type: boolean

